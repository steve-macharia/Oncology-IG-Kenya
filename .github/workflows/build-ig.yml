name: Build FHIR IG

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Java 11
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: '11'

    - name: Download IG Publisher
      run: wget https://github.com/HL7/ig-publisher/releases/latest/download/igpublisher.jar -O igpublisher.jar

    - name: Run IG Publisher
      run: java -jar igpublisher.jar -ig . -tx https://tx.fhir.org/r4

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./output
